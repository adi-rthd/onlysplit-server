services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onlysplit-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5190
      Backend__PublicBaseUrl: http://localhost:5190
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=onlysplit;Username=onlysplit;Password=onlysplit
      Jwt__Secret: development-onlysplit-secret-change-me-64-characters-minimum
      Jwt__Issuer: OnlySplit.API
      Jwt__Audience: OnlySplit.Clients
      Jwt__AccessTokenMinutes: 15
      Jwt__RefreshTokenDays: 30
      Razorpay__KeyId: rzp_test_xxxxxxxxxxxxxx
      Razorpay__KeySecret: replace-with-razorpay-test-secret
      Razorpay__WebhookSecret: replace-with-razorpay-test-webhook-secret
      Razorpay__Currency: INR
      Cors__AllowedOrigins__0: http://localhost:5190
      Cors__AllowedOrigins__1: http://localhost:3000
      Cors__AllowedOrigins__2: http://localhost:5173
      Database__RunMigrationsOnStartup: "true"
      SeedData__Enabled: "false"
    ports:
      - "5190:5190"

  postgres:
    image: postgres:16-alpine
    container_name: onlysplit-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onlysplit}
      POSTGRES_USER: ${POSTGRES_USER:-onlysplit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onlysplit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: onlysplit-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
