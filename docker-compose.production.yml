services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: onlysplit-api

    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      Backend__PublicBaseUrl: https://api-split.onlylabs.in

      AllowedHosts: "*"

      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}

      Jwt__Secret: ${Jwt__Secret}
      Jwt__Issuer: OnlySplit.API
      Jwt__Audience: OnlySplit.Clients
      Jwt__AccessTokenMinutes: 300
      Jwt__RefreshTokenDays: 30

      Razorpay__KeyId: ${Razorpay__KeyId}
      Razorpay__KeySecret: ${Razorpay__KeySecret}
      Razorpay__WebhookSecret: ${Razorpay__WebhookSecret}
      Razorpay__Currency: INR

      Cors__AllowedOrigins__0: https://split.onlylabs.in
      Cors__AllowedOrigins__1: https://onlysplit.com
      Cors__AllowedOrigins__2: https://app.onlysplit.com

      Database__RunMigrationsOnStartup: "true"
      SeedData__Enabled: "false"

    ports:
      - "5190:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine

    container_name: onlysplit-redis

    restart: unless-stopped

    command: ["redis-server", "--appendonly", "yes"]

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  redis_data:

networks:
  default:
    external: true
    name: onlysplit-network